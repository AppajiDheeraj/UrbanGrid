<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanGrid — ER Diagram</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f0f2f5; font-family: 'Inter', sans-serif; }
    svg { display: block; width: 100vw; height: 100vh; }
    #downloadBtn {
      position: fixed; top: 14px; right: 18px; z-index: 100;
      padding: 8px 18px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, #4f86f7, #7c5cf5);
      color: #fff; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; box-shadow: 0 2px 8px rgba(79,134,247,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #downloadBtn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(79,134,247,0.45); }
    #downloadBtn:active { transform: translateY(0); }
  </style>
</head>
<body>
<button id="downloadBtn" onclick="downloadPNG()">📷 Download PNG</button>
<svg id="diagram" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="hdrG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f86f7"/>
      <stop offset="100%" stop-color="#7c5cf5"/>
    </linearGradient>
    <linearGradient id="relG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#e85d04"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <filter id="diamondGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="rgba(245,158,11,0.4)"/>
    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="rgba(0,0,0,0.05)"/>
    </pattern>
  </defs>

  <!-- Light background -->
  <rect width="100%" height="100%" fill="#f0f2f5"/>
  <rect width="100%" height="100%" fill="url(#dots)"/>

  <g id="lines"></g>
  <g id="diamonds"></g>
  <g id="cards"></g>
  <g id="overlay"></g>
</svg>

<script>
const CARD_W = 140;
const HDR_H = 24;
const ROW_H = 15;
const PAD_BOTTOM = 6;
const COL_GAP = 60;
const ROW_GAP = 80;
const COL_STEP = CARD_W + COL_GAP;

const entities = [
  { id:'ministries',      label:'MINISTRIES',       attrs:['id','name','code','description','is_active'], pk:'id' },
  { id:'departments',     label:'DEPARTMENTS',      attrs:['id','ministry_id','name','code','responsibilities','is_active'], pk:'id' },
  { id:'regions',         label:'REGIONS',          attrs:['id','name','pin_codes','manager_id','department_id','is_active'], pk:'id' },
  { id:'locations',       label:'LOCATIONS',        attrs:['id','region_id','ward_no','address','pincode','latitude','longitude'], pk:'id' },
  { id:'user_settings',   label:'USER_SETTINGS',    attrs:['id','user_id','theme','language','email_notif','sms_notif','push_notif'], pk:'id' },
  { id:'users',           label:'USERS',            attrs:['id','name','email','password','role','phone','address','pincode','ward_no','is_active'], pk:'id' },
  { id:'contractors',     label:'CONTRACTORS',      attrs:['id','user_id','company_name','reg_number','gst_number','specializations','rating','is_verified'], pk:'id' },
  { id:'city_reports',    label:'CITY_REPORTS',     attrs:['id','generated_by','report_type','report_data'], pk:'id' },
  { id:'login_attempts',  label:'LOGIN_ATTEMPTS',   attrs:['id','user_id','email','ip_address','user_agent','was_successful'], pk:'id' },
  { id:'complaints',      label:'COMPLAINTS',       attrs:['id','complaint_id','citizen_id','title','description','category','images','address','pin_code','status'], pk:'id' },
  { id:'complaint_votes', label:'COMPLAINT_VOTES',  attrs:['id','complaint_id','voter_user_id','ward_no','vote_value'], pk:'id' },
  { id:'alerts',          label:'ALERTS',           attrs:['id','source_type','source_id','alert_level','message','status','resolved_by'], pk:'id' },
  { id:'audit_logs',      label:'AUDIT_LOGS',       attrs:['id','user_id','entity_type','entity_id','action','changes','ip_address'], pk:'id' },
  { id:'tenders',         label:'TENDERS',          attrs:['id','tender_id','complaint_id','ministry_id','department_id','title','budget','status','created_by'], pk:'id' },
  { id:'tender_approvals',label:'TENDER_APPROVALS', attrs:['id','tender_id','level','approver_id','status','comments'], pk:'id' },
  { id:'bids',            label:'BIDS',             attrs:['id','tender_id','contractor_id','amount','proposal','status','reviewed_by'], pk:'id' },
  { id:'projects',        label:'PROJECTS',         attrs:['id','project_id','tender_id','complaint_id','contractor_id','title','status','budget','progress_%'], pk:'id' },
  { id:'progress_updates',label:'PROGRESS_UPDATES', attrs:['id','project_id','update_type','title','description','pct_complete','submitted_by'], pk:'id' },
  { id:'verifications',   label:'VERIFICATIONS',    attrs:['id','project_id','complaint_id','type','status','verified_by','rating','recommendation'], pk:'id' },
];

entities.forEach(e => { e.h = HDR_H + e.attrs.length * ROW_H + PAD_BOTTOM; });

const grid = [
  [0,0,'ministries'], [0,1,'departments'], [0,2,'regions'], [0,3,'locations'],
  [1,0,'user_settings'], [1,1,'users'], [1,2,'contractors'], [1,3,'city_reports'],
  [2,0,'login_attempts'], [2,1,'complaints'], [2,2,'complaint_votes'], [2,3,'alerts'], [2,4,'audit_logs'],
  [3,0,'tender_approvals'], [3,1,'tenders'], [3,2,'bids'],
  [4,0,'verifications'], [4,1,'projects'], [4,2,'progress_updates'],
];

const rowMax = {};
grid.forEach(([r, c, id]) => {
  const e = entities.find(en => en.id === id);
  rowMax[r] = Math.max(rowMax[r] || 0, e.h);
});

const rowY = {};
let cumY = 48;
for (let r = 0; r <= 4; r++) {
  rowY[r] = cumY;
  cumY += rowMax[r] + ROW_GAP;
}

const LEFT_PAD = 18;
grid.forEach(([r, c, id]) => {
  const e = entities.find(en => en.id === id);
  e.x = LEFT_PAD + c * COL_STEP;
  e.y = rowY[r];
});

let maxX = 0, maxY = 0;
entities.forEach(e => {
  maxX = Math.max(maxX, e.x + CARD_W);
  maxY = Math.max(maxY, e.y + e.h);
});
const VB_W = maxX + 18;
const VB_H = maxY + 58;

document.getElementById('diagram').setAttribute('viewBox', `0 0 ${VB_W} ${VB_H}`);

/* ===== Relationships ===== */
/* t = position bias along line (0=from, 1=to). ox/oy = pixel offset for diamond. */
const rels = [
  { label:'HAS',        from:'ministries',   to:'departments',     cF:'1',cT:'N' },
  { label:'CONTAINS',   from:'departments',  to:'regions',         cF:'1',cT:'N' },
  { label:'HAS_LOCS',   from:'regions',      to:'locations',       cF:'1',cT:'N' },
  { label:'BELONGS_TO', from:'users',        to:'ministries',      cF:'N',cT:'1', t:0.30 },
  { label:'WORKS_IN',   from:'users',        to:'departments',     cF:'N',cT:'1', t:0.30 },
  { label:'OVERSEES',   from:'users',        to:'regions',         cF:'1',cT:'N', t:0.30 },
  { label:'ACTS_AS',    from:'users',        to:'contractors',     cF:'1',cT:'1' },
  { label:'HAS',        from:'users',        to:'user_settings',   cF:'1',cT:'1' },
  { label:'LOGS',       from:'users',        to:'login_attempts',  cF:'1',cT:'N', t:0.40, ox:-15 },
  { label:'SUBMITS',    from:'users',        to:'complaints',      cF:'1',cT:'N', t:0.45 },
  { label:'IN_REGION',  from:'complaints',   to:'regions',         cF:'N',cT:'1', ox:40, t:0.55 },
  { label:'RECEIVES',   from:'complaints',   to:'complaint_votes', cF:'1',cT:'N' },
  { label:'GENERATES',  from:'complaints',   to:'tenders',         cF:'1',cT:'1' },
  { label:'ISSUED_BY',  from:'tenders',      to:'ministries',      cF:'N',cT:'1', ox:-65, oy:15 },
  { label:'NEEDS',      from:'tenders',      to:'tender_approvals',cF:'1',cT:'N' },
  { label:'ATTRACTS',   from:'tenders',      to:'bids',            cF:'1',cT:'N' },
  { label:'PLACES',     from:'contractors',   to:'bids',           cF:'1',cT:'N', ox:30 },
  { label:'CREATES',    from:'tenders',      to:'projects',        cF:'1',cT:'1' },
  { label:'EXECUTES',   from:'contractors',   to:'projects',       cF:'1',cT:'N', ox:40 },
  { label:'TRACKS',     from:'projects',     to:'progress_updates',cF:'1',cT:'N' },
  { label:'VERIFIED',   from:'projects',     to:'verifications',   cF:'1',cT:'N' },
  { label:'GENERATES',  from:'users',        to:'city_reports',    cF:'1',cT:'N' },
  { label:'RESOLVES',   from:'users',        to:'alerts',          cF:'1',cT:'N', t:0.62 },
  { label:'AUDITS',     from:'users',        to:'audit_logs',      cF:'1',cT:'N', t:0.65 },
];

/* SVG helpers */
function mk(tag, attrs, parent) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  if (parent) parent.appendChild(el);
  return el;
}

const linesG = document.getElementById('lines');
const diamondsG = document.getElementById('diamonds');
const cardsG = document.getElementById('cards');
const overlayG = document.getElementById('overlay');

function edgePt(e, tx, ty) {
  const cx = e.x + CARD_W/2, cy = e.y + e.h/2;
  const dx = tx - cx, dy = ty - cy;
  if (!dx && !dy) return {x:cx, y:cy};
  const hw = CARD_W/2, hh = e.h/2;
  let best = null, bestT = Infinity;
  if (dy < 0) { const t = -hh/dy; if (Math.abs(dx*t)<=hw && t<bestT) { bestT=t; best={x:cx+dx*t, y:e.y}; } }
  if (dy > 0) { const t = hh/dy;  if (Math.abs(dx*t)<=hw && t<bestT) { bestT=t; best={x:cx+dx*t, y:e.y+e.h}; } }
  if (dx < 0) { const t = -hw/dx; if (Math.abs(dy*t)<=hh && t<bestT) { bestT=t; best={x:e.x,     y:cy+dy*t}; } }
  if (dx > 0) { const t = hw/dx;  if (Math.abs(dy*t)<=hh && t<bestT) { bestT=t; best={x:e.x+CARD_W, y:cy+dy*t}; } }
  return best || {x:cx, y:cy};
}

/* ===== 1. Lines & diamonds ===== */
rels.forEach(r => {
  const fe = entities.find(e => e.id === r.from);
  const te = entities.find(e => e.id === r.to);
  const fcx = fe.x+CARD_W/2, fcy = fe.y+fe.h/2;
  const tcx = te.x+CARD_W/2, tcy = te.y+te.h/2;

  const t = r.t || 0.5;
  const mx = fcx + (tcx-fcx)*t + (r.ox || 0);
  const my = fcy + (tcy-fcy)*t + (r.oy || 0);

  const fp = edgePt(fe, mx, my);
  const tp = edgePt(te, mx, my);

  const feRow = grid.find(g => g[2]===r.from)?.[0] ?? 0;
  const teRow = grid.find(g => g[2]===r.to)?.[0] ?? 0;
  const isLong = Math.abs(feRow - teRow) > 1;

  const lineColor = isLong ? 'rgba(0,0,0,0.08)' : 'rgba(0,0,0,0.13)';
  const lineW = isLong ? '0.8' : '1';
  const dash = isLong ? '4,3' : 'none';

  mk('line', {x1:fp.x, y1:fp.y, x2:mx, y2:my, stroke:lineColor, 'stroke-width':lineW, 'stroke-dasharray':dash, fill:'none'}, linesG);
  mk('line', {x1:mx, y1:my, x2:tp.x, y2:tp.y, stroke:lineColor, 'stroke-width':lineW, 'stroke-dasharray':dash, fill:'none'}, linesG);

  /* Diamond */
  const d = 13;
  mk('polygon', {
    points:`${mx},${my-d} ${mx+d},${my} ${mx},${my+d} ${mx-d},${my}`,
    fill:'url(#relG)', stroke:'#d97706', 'stroke-width':'1', filter:'url(#diamondGlow)'
  }, diamondsG);
  mk('text', {
    x:mx, y:my, 'font-family':'Inter,sans-serif', 'font-size':'5.2', 'font-weight':'700',
    fill:'#fff', 'text-anchor':'middle', 'dominant-baseline':'central'
  }, diamondsG).textContent = r.label;

  /* Cardinality — placed at fixed distance from entity edge with perpendicular offset */
  function cardPos(edgePt, targetPt) {
    const dx = targetPt.x - edgePt.x, dy = targetPt.y - edgePt.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 1) return edgePt;
    const nx = dx/len, ny = dy/len;
    /* 20px along line from edge, 9px perpendicular (right side) */
    return { x: edgePt.x + nx*20 + ny*9, y: edgePt.y + ny*20 - nx*9 };
  }
  const cp1 = cardPos(fp, {x:mx,y:my});
  const cp2 = cardPos(tp, {x:mx,y:my});

  [{p:cp1,c:r.cF},{p:cp2,c:r.cT}].forEach(({p,c}) => {
    mk('text', {
      x:p.x, y:p.y, 'font-family':'Inter,sans-serif', 'font-size':'8', 'font-weight':'800',
      fill:'#b45309', 'text-anchor':'middle', 'dominant-baseline':'central'
    }, diamondsG).textContent = c;
  });
});

/* ===== 2. Entity cards ===== */
entities.forEach(e => {
  const g = mk('g', {}, cardsG);

  /* Card shadow + body */
  mk('rect', {
    x:e.x, y:e.y, width:CARD_W, height:e.h,
    fill:'#ffffff', stroke:'#d0d5dd', 'stroke-width':'1', rx:6, ry:6,
    filter:'url(#cardShadow)'
  }, g);

  /* Header */
  mk('rect', {
    x:e.x, y:e.y, width:CARD_W, height:HDR_H,
    fill:'url(#hdrG)', rx:6, ry:6
  }, g);
  mk('rect', {
    x:e.x, y:e.y+HDR_H-6, width:CARD_W, height:6, fill:'url(#hdrG)'
  }, g);
  mk('line', {
    x1:e.x, y1:e.y+HDR_H, x2:e.x+CARD_W, y2:e.y+HDR_H,
    stroke:'#e0e0e0', 'stroke-width':'0.5'
  }, g);

  /* Header text */
  mk('text', {
    x:e.x+CARD_W/2, y:e.y+HDR_H/2,
    'font-family':'Inter,sans-serif', 'font-weight':'700', 'font-size':'9',
    fill:'#fff', 'text-anchor':'middle', 'dominant-baseline':'central',
    'letter-spacing':'0.4'
  }, g).textContent = e.label;

  /* Attributes */
  e.attrs.forEach((a, i) => {
    const ay = e.y + HDR_H + 4 + i * ROW_H + ROW_H/2;
    const isPk = (a === e.pk);

    if (i % 2 === 0) {
      mk('rect', {
        x:e.x+1, y:e.y+HDR_H+4+i*ROW_H, width:CARD_W-2, height:ROW_H,
        fill:'rgba(0,0,0,0.02)', rx:1
      }, g);
    }

    if (isPk) {
      mk('text', {
        x:e.x+9, y:ay, 'font-family':'Inter,sans-serif', 'font-size':'7',
        fill:'#d97706', 'dominant-baseline':'central'
      }, g).textContent = '🔑';
    }

    const t = mk('text', {
      x: e.x + (isPk ? 22 : 11), y: ay,
      'font-family':'Inter,sans-serif', 'font-size':'8',
      fill: isPk ? '#b45309' : '#495057',
      'font-weight': isPk ? '600' : '400',
      'dominant-baseline':'central'
    }, g);
    if (isPk) t.setAttribute('text-decoration', 'underline');
    t.textContent = a;
  });
});

/* ===== 3. Title ===== */
mk('text', {
  x: VB_W/2, y: 24,
  'font-family':'Inter,sans-serif', 'font-weight':'700', 'font-size':'15',
  fill:'#1e293b', 'text-anchor':'middle', 'dominant-baseline':'central',
  'letter-spacing':'0.3'
}, overlayG).textContent = '🌆  UrbanGrid — Entity-Relationship Diagram';

/* ===== 4. Legend ===== */
const lgX = VB_W - 210, lgY = VB_H - 44;
mk('rect', {x:lgX, y:lgY, width:200, height:38, fill:'rgba(255,255,255,0.9)', stroke:'#d0d5dd', 'stroke-width':'0.6', rx:5}, overlayG);

const legendItems = [
  {x:lgX+10, label:'Entity', type:'rect'},
  {x:lgX+58, label:'Relationship', type:'diamond'},
  {x:lgX+132, label:'Primary Key', type:'pk'},
];

legendItems.forEach(item => {
  const iy = lgY + 14;
  if (item.type === 'rect') {
    mk('rect', {x:item.x, y:iy-4, width:13, height:9, fill:'url(#hdrG)', rx:2}, overlayG);
  } else if (item.type === 'diamond') {
    mk('rect', {x:item.x+2, y:iy-4, width:8, height:8, fill:'url(#relG)', transform:`rotate(45 ${item.x+6} ${iy})`}, overlayG);
  } else if (item.type === 'pk') {
    mk('text', {x:item.x, y:iy, 'font-family':'Inter', 'font-size':'7', fill:'#d97706', 'font-weight':'700', 'text-decoration':'underline', 'dominant-baseline':'central'}, overlayG).textContent = '🔑 id';
  }
  mk('text', {
    x: item.x + (item.type==='pk'?22:16), y: iy,
    'font-family':'Inter', 'font-size':'6.5', fill:'#666', 'dominant-baseline':'central'
  }, overlayG).textContent = item.label;
});

/* Cardinality in legend */
mk('text', {x:lgX+170, y:lgY+28, 'font-family':'Inter', 'font-size':'8', fill:'#b45309', 'font-weight':'800', 'dominant-baseline':'central'}, overlayG).textContent = '1 / N';
mk('text', {x:lgX+152, y:lgY+28, 'font-family':'Inter', 'font-size':'6.5', fill:'#666', 'dominant-baseline':'central', 'text-anchor':'end'}, overlayG).textContent = 'Cardinality';
/* ===== 5. Download as high-res PNG ===== */
function downloadPNG() {
  const btn = document.getElementById('downloadBtn');
  btn.textContent = '⏳ Generating...';
  btn.disabled = true;

  const svgEl = document.getElementById('diagram');
  const vb = svgEl.getAttribute('viewBox').split(' ').map(Number);
  const svgW = vb[2], svgH = vb[3];

  /* 3x resolution for crisp output */
  const scale = 3;
  const canvas = document.createElement('canvas');
  canvas.width = svgW * scale;
  canvas.height = svgH * scale;
  const ctx = canvas.getContext('2d');

  /* Fill background */
  ctx.fillStyle = '#f0f2f5';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  /* Clone SVG and set explicit dimensions */
  const clone = svgEl.cloneNode(true);
  clone.setAttribute('width', svgW);
  clone.setAttribute('height', svgH);
  clone.removeAttribute('style');

  /* Inline the font for the exported image */
  const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
  styleEl.textContent = `
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    text { font-family: 'Inter', sans-serif; }
  `;
  clone.insertBefore(styleEl, clone.firstChild);

  const svgData = new XMLSerializer().serializeToString(clone);
  const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);

    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'UrbanGrid_ER_Diagram.png';
      a.click();
      URL.revokeObjectURL(a.href);
      btn.textContent = '✅ Downloaded!';
      setTimeout(() => { btn.textContent = '📷 Download PNG'; btn.disabled = false; }, 2000);
    }, 'image/png');
  };
  img.onerror = () => {
    btn.textContent = '❌ Error';
    setTimeout(() => { btn.textContent = '📷 Download PNG'; btn.disabled = false; }, 2000);
  };
  img.src = url;
}
</script>
</body>
</html>
